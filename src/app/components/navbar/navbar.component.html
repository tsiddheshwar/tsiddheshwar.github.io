<nav class="navbar navbar-expand-lg app-navbar px-3">
    <!-- Brand -->
    <a class="navbar-brand d-flex align-items-center gap-2 clickable" routerLink="/">
        <img src="assets/ST_icon.png" alt="brand" class="brand-logo">
        <span class="brand-name">{{ appTitle }}</span>
    </a>

    <!-- Mobile toggler -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav me-auto ms-3">
            <li class="nav-item">
                <a class="nav-link clickable" routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link clickable" routerLink="/home" fragment="about">About</a>
            </li>
            <li class="nav-item">
                <a class="nav-link clickable" routerLink="/home" fragment="skills">Skills</a>
            </li>
            <li class="nav-item">
                <a class="nav-link clickable" routerLink="/home" fragment="projects">Projects</a>
            </li>
            <li class="nav-item">
                <a class="nav-link clickable" routerLink="/home" fragment="experience">Experience</a>
            </li>
            <li class="nav-item">
                <a class="nav-link clickable" routerLink="/contact" routerLinkActive="active">Contact</a>
            </li>
        </ul>

        <!-- Theme toggle -->
        <div class="theme-switcher d-flex align-items-center gap-1 ms-auto">
            <button
                class="theme-btn"
                [class.active]="(themeService.mode$ | async) === 'light'"
                (click)="setTheme('light')"
                title="Light mode">
                ☀
            </button>
            <button
                class="theme-btn"
                [class.active]="(themeService.mode$ | async) === 'auto'"
                (click)="setTheme('auto')"
                title="Auto (follow OS)">
                ⚙
            </button>
            <button
                class="theme-btn"
                [class.active]="(themeService.mode$ | async) === 'dark'"
                (click)="setTheme('dark')"
                title="Dark mode">
                🌙
            </button>
        </div>
    </div>
</nav>
